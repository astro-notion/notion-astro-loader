name: CI

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master

# Add global permission configuration
permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and Format Check
        run: npx prettier --check "src/**/*.{ts,js,json}"

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: pnpm test

      - name: Build
        run: pnpm build

name: Release Master

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Type Check
        run: pnpm typecheck

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_OUTPUT

      - name: Build
        run: pnpm build

      - name: Setup Node.js with registry
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          name: Release v${{ steps.package-version.outputs.version }}
          draft: false
          generate_release_notes: true
          body: |
            ## 📦 NPM Package
            https://www.npmjs.com/package/@astro-notion/loader/v/${{ steps.package-version.outputs.version }}

            ```
            npm install @astro-notion/loader@${{ steps.package-version.outputs.version }}
            ```

            or

            ```
            pnpm add @astro-notion/loader@${{ steps.package-version.outputs.version }}
            ```
          token: ${{ secrets.GITHUB_TOKEN }}
